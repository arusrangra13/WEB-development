<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart – ShopWave</title>
  <meta name="description" content="Review your cart and checkout securely at ShopWave."/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">🌊</div>
      <span>ShopWave</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html">Electronics</a>
      <a href="index.html">Fashion</a>
      <a href="index.html">Sports</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" class="cart-btn active">
        🛒 Cart
        <span class="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>🛒 Your Cart</h1>
    <p>Review your items and proceed to checkout</p>
  </div>

  <!-- CART LAYOUT -->
  <div class="cart-layout">
    <!-- Cart Items -->
    <div class="cart-items-section" id="cart-items-container">
      <!-- Rendered by JS -->
    </div>

    <!-- Order Summary -->
    <div class="order-summary" id="order-summary">
      <h3>Order Summary</h3>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="summary-subtotal">$0.00</span>
      </div>
      <div class="summary-row discount-row">
        <span>You Save</span>
        <span id="summary-discount">-$0.00</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span id="summary-shipping">-</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="summary-total">$0.00</span>
      </div>
      <div class="promo-box">
        <input type="text" class="promo-input" id="promo-input" placeholder="Promo code (try SAVE10)" />
        <button class="promo-btn" onclick="applyPromo()">Apply</button>
      </div>
      <button class="checkout-btn" onclick="checkout()">
        🔒 Secure Checkout
      </button>
      <div class="payment-icons">
        <span class="pay-icon">💳 Visa</span>
        <span class="pay-icon">💳 Mastercard</span>
        <span class="pay-icon">🍎 Pay</span>
        <span class="pay-icon">🅿️ PayPal</span>
      </div>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
